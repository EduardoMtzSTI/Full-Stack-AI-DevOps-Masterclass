name: Demo CI Env Secrets

on:
  push
  # workflow_dispatch

env:
  GLOBAL_APP_ENV: global-dev

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JOB_APP_ENV: job-dev

    steps:
      - name: Say hello
        run: echo "Hello from demo CI Env Secrets"

      - name: Install
        env:
          APP_ENV: demo_new
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: echo "Envioroment $APP_ENV using $DB_PASSWORD, $GLOBAL_APP_ENV, $JOB_APP_ENV"

      - name: Cretate demo file
        run: |
          echo "Hello from CI Pipeline" > demo.txt
          echo "File created successfully"

      - name: Upload demo
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-demo
          path: .

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Test Job
        run: echo "TestJob"
